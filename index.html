0.png'),load('player_walk_right_1.png'),load('player_walk_right_2.png'),load('player_walk_right_3.png')]},coin:{heads:load('coin_heads.png'),tails:load('coin_tails.png'),bone:load('coin_bone.png'),crown:load('coin_crown.png'),devil:load('coin_devil.png'),wild:load('coin_wild.png')},quitMiner:load('quit_miner.png')};

};
Object.values(AudioBank).flat().forEach(a=>{a.preload='auto'});
AudioBank.menu_music.loop=true;AudioBank.inside_game.loop=true;
let currentMusic=null,currentMusicKey=null;
const laugh=AudioBank.devil_laugh;

const coinKeys=['heads','tails','bone','crown','devil','wild'];
const coinDefs={heads:{name:'Heads',base:12,weight:30},tails:{name:'Tails',base:12,weight:30},bone:{name:'Bone',base:20,weight:15},crown:{name:'Crown',base:28,weight:9},devil:{name:'Devil',base:38,weight:7},wild:{name:'Wild',base:14,weight:5}};
const upgrades=[
{id:'penny',cat:'Upgrade',name:'Lucky Penny',desc:'+1 flip each table.',cost:10,apply:g=>g.up.penny++},
{id:'silver',cat:'Upgrade',name:'Silver Tongue',desc:'+0.25 multiplier on every hand.',cost:11,apply:g=>g.up.silver++},
{id:'magnet',cat:'Upgrade',name:'Infernal Magnet',desc:'Devil coins score +30%.',cost:10,apply:g=>g.up.magnet++},
{id:'dice',cat:'Upgrade',name:'Ritual Dice',desc:'+1 reroll charge each table.',cost:11,apply:g=>g.up.dice++},
{id:'ledger',cat:'Relic',name:'Apostle Ledger',desc:'Future quotas shrink by 7%.',cost:14,apply:g=>g.up.ledger++},
{id:'heart',cat:'Relic',name:'Spare Heart',desc:'+1 life right now.',cost:16,apply:g=>{g.lives++;g.up.heart++}},

{id:'mirror',cat:'Pact',name:'Cracked Mirror',desc:'Rerolls score 2x but cost 1 obol.',cost:12,apply:g=>g.up.mirror++},
{id:'blessed',cat:'Coin',name:'Blessed Coin',desc:'Add a Crown coin to your bag.',cost:7,apply:g=>g.bag.push('crown')},
{id:'cursed',cat:'Coin',name:'Cursed Coin',desc:'Add a Devil coin to your bag.',cost:6,apply:g=>g.bag.push('devil')},
{id:'joker',cat:'Coin',name:'Joker Coin',desc:'Add a Wild coin to your bag.',cost:10,apply:g=>g.bag.push('wild')},
{id:'grip',cat:'Upgrade',name:'Velvet Clips',desc:'+1 hold limit each round.',cost:12,apply:g=>g.up.grip++}
];
const events=[
{title:'A beggar blocks the aisle.',body:'The homeless man from the foyer offers a bent coin. It is either mercy or a trap.',opts:[['Take the coin',g=>{g.bag.push(Math.random()<.55?'wild':'bone');g.xp+=18;note('You pocket the bent coin. +18 XP.')}],['Give 2 obols',g=>{if(g.money>=2){g.money-=2;g.lives++;note('He blesses your palm. +1 life.')}else note('You have no obols to spare.')}],['Walk away',g=>note('You keep your eyes on the table.')]]},
{title:'The slot machine coughs smoke.',body:'A jammed machine flashes three red bars. It asks for blood or money.',opts:[['Pay 3 obols',g=>{if(g.money>=3){g.money-=3;g.score+=60;note('The machine spits tribute. +60 score.')}else note('The machine laughs at your empty pockets.')}],['Kick it',g=>{if(Math.random()<.5){g.money+=5;note('Jackpot scraps. +5 obols.')}else{hurt('The machine bites your ankle. -1 life.')}}],['Ignore',g=>note('It keeps coughing behind you.')]]},
{title:'The Devil whispers through the felt.',body:'One held coin can become something better, if you let the table burn.',opts:[['Burn a hold',g=>{const i=g.held.findIndex(Boolean);if(i>=0){g.held[i]=false;g.hand[i]='devil';note('A held coin melts into a Devil.')}else note('No held coin answered.')}],['Refuse',g=>note('The whisper fades. For now.')]]},
{title:'Ferryman discount.',body:'The ferryman is distracted counting teeth.',opts:[['Steal a discount',g=>{g.rent=Math.max(0,g.rent-2);note('Next payment reduced by 2.')}],['Do nothing',g=>note('Better not anger him.')]]}
];
let settings=Object.assign({sfx:.12,music:.20,mute:false,textSpeed:38,shake:true},JSON.parse(localStorage.getItem('dcf_settings_v16')||localStorage.getItem('dcf_settings_v11')||'{}'));
let game,keys={},mouse={x:0,y:0,down:false},buttons=[],particles=[],floaters=[],banner=null,shake=0,last=performance.now(),audio=null,music=null,transition=null,frameClock=0,hoverTip=null,lastDevilLaughAt=0,musicPausedUntil=0,duckTimer=null,musicDuckUntil=0,musicDuckAmount=1,pauseReturnScreen='menu',inputLockUntil=0,activeVoiceClip=null,activeGoodComboClip=null,lastVoiceAt=0,lastRunOutcome=null,nextIntroMode=null,konamiInput=[];
const KONAMI=['arrowup','arrowup','arrowdown','arrowdown','arrowleft','arrowright','arrowleft','arrowright','b','a'];
function fresh(){return{screen:'menu',round:1,maxRound:10,lives:3,level:1,maxLevel:10,xp:0,xpNeed:70,money:5,score:0,quota:250,flips:7,maxFlips:7,rent:3,rerolls:0,hand:[],held:[false,false,false,false,false],lastCombo:'',bag:['heads','tails','heads','tails','bone','bone','crown'],shop:[],dialog:null,choice:null,cine:null,event:null,eventResult:null,log:['The pact is waiting.'],player:{x:620,y:555,dir:'up',frame:0,walk:0,moving:false,speed:2.8},mapRoom:'hub',roomFade:0,roomTo:null,npc:{beggarGift:false,beggarStory:false,beggarTalks:0,hostTopicWhere:false,hostTopicRules:false,hostTalks:0,slotPlayed:false,slotJackpotInfo:false,slotTalks:0},up:{penny:0,silver:0,magnet:0,dice:0,ledger:0,heart:0,collector:0,chain:0,storm:0,mirror:0,grip:0},freeMiss:true,comboFx:null,stats:{best:0,total:0,clears:0}}}
function holdCap(){return 2+(game?.up?.grip||0)}

function saveSettings(){localStorage.setItem('dcf_settings_v16',JSON.stringify(settings));syncSettingsUI();updateAudioVolumes()}
function syncSettingsUI(){
 if(!settingsDom.root)return;
 const show=!!game && game.screen==='settings';
 settingsDom.root.style.display=show?'grid':'none';
 settingsDom.sfx.value=Math.round((settings.sfx||0)*100); settingsDom.music.value=Math.round((settings.music||0)*100);
 settingsDom.text.value=settings.textSpeed||38; settingsDom.mute.checked=!!settings.mute; settingsDom.shake.checked=!!settings.shake;
 settingsDom.sfxVal.value=`${Math.round((settings.sfx||0)*100)}%`; settingsDom.musicVal.value=`${Math.round((settings.music||0)*100)}%`; settingsDom.textVal.value=`${settings.textSpeed||38}`;
}
[['input',settingsDom.sfx,()=>{settings.sfx=Math.max(0,Math.min(1,Number(settingsDom.sfx.value)/100));saveSettings()}],['input',settingsDom.music,()=>{settings.music=Math.max(0,Math.min(.6,Number(settingsDom.music.value)/100));saveSettings()}],['input',settingsDom.text,()=>{settings.textSpeed=Number(settingsDom.text.value);saveSettings()}],['change',settingsDom.mute,()=>{settings.mute=!!settingsDom.mute.checked;saveSettings()}],['change',settingsDom.shake,()=>{settings.shake=!!settingsDom.shake.checked;saveSettings()}]].forEach(([ev,el,fn])=>el&&el.addEventListener(ev,fn));

function startDialog(lines,onDone){stopActiveVoice();game.dialog={lines,i:0,c:0,t:0,onDone,lock:.16};if(lines&&lines[0])npcPhraseSfx(lines[0].sp)}
function startChoice(sp,title,body,opts){stopActiveVoice();game.choice={sp,title,body,opts,sel:0};npcPhraseSfx(sp)}
function advanceDialog(){const d=game.dialog;if(!d)return; if(d.lock>0)return; const line=d.lines[d.i]; if(d.c<line.tx.length){d.c=line.tx.length;return} d.i++;d.c=0;d.lock=.18;if(d.i>=d.lines.length){stopActiveVoice();const cb=d.onDone;game.dialog=null;if(cb)cb()}else{stopActiveVoice();npcPhraseSfx(d.lines[d.i].sp)}}
function updateDialog(dt){const d=game.dialog;if(!d)return;d.lock=Math.max(0,d.lock-dt);const line=d.lines[d.i];d.t+=dt;while(d.t>1/settings.textSpeed&&d.c<line.tx.length){d.t-=1/settings.textSpeed;d.c++;if(d.c%6===0)voiceSfx(line.sp)}}

function near(x,y,r=70){const p=game.player;return Math.hypot((p.x+20)-x,(p.y+32)-y)<r}
function nearDoor(){return game.mapRoom==='hub'&&near(640,230,90)}
function transitionRoom(room,px,py,dir='down'){
  if(game.screen!=='foyer'||game.dialog||game.choice||game.roomTo)return;
  if(performance.now()<inputLockUntil)return;
  inputLockUntil=performance.now()+420;
  game.roomTo={room,px,py,dir,t:0,phase:'out'};
  sfx('door');
}
function finishRoomTransition(){
  const r=game.roomTo;if(!r)return;
  game.mapRoom=r.room;game.player.x=r.px;game.player.y=r.py;game.player.dir=r.dir;game.roomFade=.55;game.roomTo=null;
}
function nearestNpc(){
  if(game.mapRoom==='hub'){
    if(nearDoor())return'door';
    if(near(238,318,130))return'host';
    if(near(36,358,70))return'westDoor';
    if(near(1238,358,70))return'eastDoor';
  }
  if(game.mapRoom==='alley'){
    if(near(156,500,86))return'beggar';
    if(near(1032,476,118))return'hubDoor';
  }
  if(game.mapRoom==='slots'){
    if(near(642,338,70))return'slot';
    if(near(80,350,62))return'hubDoor';
  }
  return null;
}

 if(t>1.0){ctx.drawImage(A.host[Math.floor(frameClock*6)%4],748,308+Math.sin(frameClock*2.7)*2,74,108);text('Host',785,296,16,'#ffd36e','center')}
 // black vignette outside room
 let vg=ctx.createRadialGradient(640,332,230,640,332,780); vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.60)'); ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
 if(!awake){
   rect(424,516,392,62,'rgba(92,33,48,.90)','#ffd36e',4);
   const press=.5+.5*Math.sin(frameClock*8.2), pulse=.5+.5*Math.sin(frameClock*4.2);
   rect(452,531+(press>.8?2:0),74,32,'rgba(65,34,44,.95)','#f0c26a',3); text('SPACE',489,553+(press>.8?2:0),18,'#fff0b5','center');
   text('TO WAKE UP',636,554,30,'#fff0b5','center');
   text('A coin taps somewhere in the dark.',640,616,18,'#c9a88b','center');
   text('Dust floats under the lamp. The room finally has shape: bed, drawer, window, debt.',640,640,15,'#9e8771','center');
   return;
 }
 ctx.fillStyle=`rgba(0,0,0,${Math.max(0,1-t/1.1)})`;ctx.fillRect(0,0,W,H);
 const msg=t<1.05?'The mattress releases you in pieces. First breath. Then weight. Then memory.':t<2.0?'The lamp buzzes, the moon leans through the glass, and somebody in red is already waiting.':'The Fallen House keeps no sunlight — only promises, dust, and debt.';
 text(msg,640,606,21,'#fff0c7','center');
 if(t>1.65){rect(858,226,106,60,'rgba(80,24,36,.92)','#d05a63',2);text('10',911,256,24,'#ffd36e','center');text('tables to live',911,280,12,'#c9a88b','center')}
}

function drawChoice(){
 const c=game.choice;if(!c)return;
 rect(70,440,1140,235,'rgba(10,5,9,.99)','#ffd36e',4);drawPortrait(c.sp,96,476);
 rect(236,462,330,34,'#6b2331','#d05a63',2);text(c.title||c.sp,254,486,21,'#fff2a8');
 wrap(c.body||'',820).slice(0,3).forEach((l,i)=>text(l,238,532+i*27,21,'#fff4d6'));
 c.opts.forEach((op,i)=>{const x=238+i*302,y=622;btn(op[0],x,y,276,38,()=>chooseNpcOption(i),false);if(i===c.sel)rect(x-5,y-5,286,48,'rgba(255,211,110,.06)','#ffd36e',2)});
 text('Choose with mouse, or 1-3 / arrows + Enter',790,486,16,'#c7a98d');
}
function chooseNpcOption(i){const c=game.choice;if(!c||!c.opts[i])return;sfx('select');const fn=c.opts[i][1];game.choice=null;if(fn)fn()}
function drawDialog(){const d=game.dialog;if(!d)return;const line=d.lines[d.i];rect(70,492,1140,185,'rgba(10,5,9,.99)','#ffd36e',4);drawPortrait(line.sp,96,530);rect(236,516,250,34,'#6b2331','#d05a63',2);text(line.sp,254,540,21,'#fff2a8');const shown=line.tx.slice(0,d.c);wrap(shown,850).slice(0,4).forEach((l,i)=>text(l,238,590+i*29,23,'#fff4d6'));text(`${d.i+1}/${d.lines.length}`,1120,540,18,'#c7a98d');if(d.c>=line.tx.length)text('Enter / Space',1000,652,18,'#ffd36e')}

function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/55);ctx.fillStyle=p.col;ctx.fillRect(p.x,p.y,p.sz,p.sz)});ctx.globalAlpha=1}
function drawBanner(){
 if(!banner)return;
 if(game.screen==='table'&&game.comboFx&&game.comboFx.life>0)return;
 let w=Math.min(920,120+banner.msg.length*14),x=640-w/2,y=(game.screen==='table'?178:112),h=banner.sub?72:50;
 rect(x,y,w,h,'rgba(35,13,26,.96)',banner.big?'#ffd36e':'#ef6a55',4);
 text(banner.msg,640,y+31,banner.big?26:21,banner.big?'#fff0b5':'#ffe2d2','center');
 if(banner.sub)text(banner.sub,640,y+58,22,'#b9ffc0','center')
}
function drawFloaters(){
 floaters.forEach(f=>{ctx.globalAlpha=Math.max(0,Math.min(1,f.life/40)); if(f.kind==='rally'){text('TRIBUTE RALLY',f.x,f.y-28,18,'#ffd36e','center');text('+'+f.shown,f.x,f.y,34,'#b9ffc0','center')} else {text(f.txt,f.x,f.y,f.big?28:18,f.col,'center')} ctx.globalAlpha=1})
}

function drawCoinAura(kind,x,y,strong=1){
 const p=.5+.5*Math.sin(frameClock*6+x*.02), a=.20*strong;
 ctx.save();
 if(kind==='heads'){
   ctx.globalAlpha=.24+a; ctx.fillStyle='#ffd36e'; for(let i=0;i<6;i++){ctx.fillRect(x-40+i*16,y-66-(i%2)*8,4,10);ctx.fillRect(x-40+i*16,y+54+(i%2)*4,4,8)}
   ctx.strokeStyle='rgba(255,220,120,.55)'; ctx.strokeRect(x-50,y-54,100,108);
 }else if(kind==='tails'){
   ctx.globalAlpha=.22+a; ctx.strokeStyle='rgba(112,215,255,.55)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(x,y,62+p*6,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(x,y,76-p*4,0,Math.PI*2); ctx.stroke();
 }else if(kind==='bone'){
   ctx.globalAlpha=.22+a; ctx.strokeStyle='rgba(232,232,232,.55)'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(x-44,y-30);ctx.lineTo(x-8,y+6);ctx.moveTo(x-8,y-30);ctx.lineTo(x-44,y+6);ctx.moveTo(x+44,y-30);ctx.lineTo(x+8,y+6);ctx.moveTo(x+8,y-30);ctx.lineTo(x+44,y+6);ctx.stroke();
 }else if(kind==='crown'){
   ctx.globalAlpha=.24+a; ctx.strokeStyle='rgba(255,244,182,.68)'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(x-64,y+2);ctx.quadraticCurveTo(x-92,y-34,x-66,y-42);ctx.quadraticCurveTo(x-50,y-16,x-38,y+8);ctx.stroke(); ctx.beginPath(); ctx.moveTo(x+64,y+2);ctx.quadraticCurveTo(x+92,y-34,x+66,y-42);ctx.quadraticCurveTo(x+50,y-16,x+38,y+8);ctx.stroke();
   ctx.beginPath();ctx.arc(x,y-56,14+p*3,0,Math.PI*2);ctx.stroke();
 }else if(kind==='devil'){
   ctx.globalAlpha=.18+a; drawBigDevil(x+70,y-10,.42+.02*p); ctx.globalAlpha=.35+a; ctx.fillStyle='rgba(255,87,67,.55)'; for(let i=0;i<4;i++){ctx.fillRect(x-42+i*24,y+44-i*3,12,14+i*2);ctx.fillRect(x-46+i*24,y-70+i*2,10,10)}
 }else if(kind==='wild'){
   ctx.globalAlpha=.26+a; ctx.strokeStyle='rgba(212,162,255,.75)'; ctx.lineWidth=4; for(let dx of [-42,0,42]){ctx.beginPath();ctx.moveTo(x+dx,y-58);ctx.lineTo(x+dx-12,y-26);ctx.lineTo(x+dx+8,y-26);ctx.lineTo(x+dx-8,y+10);ctx.stroke()}
 }
 ctx.restore();
}

function drawComboFx(){
 const f=game.comboFx;if(!f||game.screen!=='table')return;
 const a=Math.max(0,Math.min(1,Math.min(f.t*4,f.life/20))); if(a<=0)return;
 const pulse=.6+.4*Math.sin(frameClock*7), glowColor=f.accent||'#ffd36e';
 ctx.save();
 ctx.globalAlpha=.14*a; let g=ctx.createRadialGradient(640,274,40,640,292,440); g.addColorStop(0,glowColor); g.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=g; ctx.fillRect(154,120,972,400);
 ctx.globalAlpha=.16*a; ctx.fillStyle='#000'; ctx.fillRect(92,144,1096,330); ctx.globalAlpha=1;
 if(f.type==='devil'){ctx.globalAlpha=.28*a; drawBigDevil(994,286,.94+.05*pulse); ctx.globalAlpha=1;}
 rect(390,192,500,108,'rgba(18,7,13,.96)',glowColor,4);
 text(f.title,640,226,f.tier>=2?38:30,glowColor,'center');
 text(f.combo,640,260,24,'#fff0c7','center');
 rect(470,316,340,44,'rgba(0,0,0,.58)',glowColor,3); text(f.points,640,346,24,'#b9ffc0','center');
 // graphic-only accent band
 if(f.type==='devil'){drawCoinAura('devil',640,258,1.4)}
 else if(f.type==='crown'){drawCoinAura('crown',640,252,1.4)}
 else if(f.type==='bone'){drawCoinAura('bone',640,252,1.4)}
 else if(f.type==='wild'){drawCoinAura('wild',640,252,1.4)}
 else if(f.type==='tails'){drawCoinAura('tails',640,252,1.35)}
 else {drawCoinAura('heads',640,252,1.35)}
 ctx.restore();
}
function drawTransitionOverlay(){if(!transition)return;let p=Math.min(1,transition.t/transition.d),a=p<.5?p*2:(1-p)*2;ctx.fillStyle=`rgba(0,0,0,${a*.92})`;ctx.fillRect(0,0,W,H);if(a>.55){text('• • •',640,365,34,'#ffd36e','center')}}
function updateCanvasCursor(){
 let hovering=false;
 for(let i=buttons.length-1;i>=0;i--){const b=buttons[i];if(!b.disabled&&mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h){hovering=true;break}}
 if(!hovering&&game){
   if(game.screen==='table'&&!game.flipAnim&&game.hand.length){for(let i=0;i<5;i++){let x=slotX(i)-78,y=slotY(i)-82;if(mouse.x>=x&&mouse.x<=x+156&&mouse.y>=y&&mouse.y<=y+184){hovering=true;break}}}
   if(game.screen==='foyer'&&nearestNpc())hovering=true;
 }
 canvas.classList.toggle('hovering',hovering);
 canvas.style.cursor=hovering?"url('assets/cursor/pointer32.png') 2 2, pointer":"url('assets/cursor/cursor32.png') 2 2, auto";
}
function render(){buttons=[];hoverTip=null;syncSettingsUI();const ox=settings.shake&&shake>0?(Math.random()-.5)*shake:0,oy=settings.shake&&shake>0?(Math.random()-.5)*shake:0;ctx.save();ctx.translate(ox,oy);if(game.screen==='menu')drawTitle();else if(game.screen==='settings')drawSettings();else if(game.screen==='comboGuide')drawComboGuide();else if(game.screen==='quit')drawQuit();else if(game.screen==='opening')drawOpening();else if(game.screen==='intro'){drawFoyer();drawDialog()}else if(game.screen==='foyer')drawFoyer();else if(game.screen==='cinematic')drawCinematic();else if(game.screen==='table')drawTable();else if(game.screen==='shop')drawShop();else if(game.screen==='event')drawEvent();else if(game.screen==='eventResult')drawEventResult();else if(game.screen==='ending')drawEnding();else if(game.screen==='gameover')drawGameOver();drawParticles();drawFloaters();if(!['ending','gameover'].includes(game.screen))drawBanner();if(game.dialog&&game.screen!=='intro')drawDialog();if(game.choice)drawChoice();drawTransitionOverlay();updateCanvasCursor();ctx.restore()}
function loop(){let now=performance.now(),dt=Math.min(.033,(now-last)/1000);last=now;update(dt);render();requestAnimationFrame(loop)}
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouse.x=(e.clientX-r.left)*W/r.width;mouse.y=(e.clientY-r.top)*H/r.height});
canvas.addEventListener('mousedown',()=>{ensureAudio();mouse.down=true;let hit=false;for(let i=buttons.length-1;i>=0;i--){let b=buttons[i];if(mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h){if(!b.disabled){if(performance.now()<inputLockUntil)return;inputLockUntil=performance.now()+180;sfx('select');b.fn()}hit=true;break}}if(!hit&&game.screen==='table'&&!game.flipAnim&&game.hand.length){for(let i=0;i<5;i++){let x=slotX(i)-78,y=slotY(i)-82;if(mouse.x>=x&&mouse.x<=x+156&&mouse.y>=y&&mouse.y<=y+184){toggleHold(i)}}}});
window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys[k]=true;if(e.repeat&&(k==='e'||k==='enter'||e.code==='Space'))return;if([' ','enter'].includes(k)||['arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();ensureAudio();startMusic();checkKonami(k);if(game.screen==='ending'&&game.cine&&game.cine.kind==='win'&&(k==='enter'||e.code==='Space')&&game.cine.t>6.1){game.endMsg=game.cine.msg;game.win=true;setScreen('gameover');return}if(game.screen==='opening'&&!game.dialog&&(k==='enter'||e.code==='Space')){if(game.cine&&game.cine.kind==='htmlIntro'){finishHtmlIntro();return}if(!game.cine.awake){game.cine.awake=true;game.cine.t=0;sfx('select')}return}if(e.repeat&&game.dialog)return;if(game.dialog&&(k==='enter'||e.code==='Space')){advanceDialog();return}if(game.choice){if(['1','2','3','4'].includes(k)){chooseNpcOption(Number(k)-1);return}if(k==='arrowleft'||k==='a')game.choice.sel=Math.max(0,game.choice.sel-1);else if(k==='arrowright'||k==='d')game.choice.sel=Math.min(game.choice.opts.length-1,game.choice.sel+1);else if(k==='enter'||e.code==='Space')chooseNpcOption(game.choice.sel);return}if(k==='c'&&['menu','table','shop'].includes(game.screen)){pauseReturnScreen=game.screen;setScreen('comboGuide');return}if(game.screen==='menu'&&k==='enter')startRun();else if(game.screen==='foyer'&&k==='e')interact();else if(game.screen==='table'&&e.code==='Space')flip();else if(game.screen==='table'&&k==='r')reroll();else if(game.screen==='table'&&'12345'.includes(k))toggleHold(Number(k)-1);else if(game.screen==='table'&&k==='0')startEnding(true,'Dev trigger: jumping straight to the ending cinematic.');else if(game.screen==='table'&&k==='9')startEnding(false,'Dev trigger: testing the out-of-lives cinematic.');else if(k==='escape'){if(game.screen==='settings'||game.screen==='comboGuide')setScreen(pauseReturnScreen||'menu');else if(game.screen==='quit')setScreen('menu');else if(['table','shop','foyer'].includes(game.screen))setScreen('settings')}});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
game=fresh();rollShop();loop();
</script>
